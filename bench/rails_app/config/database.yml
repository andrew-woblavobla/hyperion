default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
  # mode=memory&cache=shared: in-memory database shared across all
  # connections in the pool. Without cache=shared, each Rails
  # connection-pool thread would see a fresh empty DB.
  database: "file:rails_bench?mode=memory&cache=shared&uri=true"

production:
  <<: *default

development:
  <<: *default

test:
  <<: *default
